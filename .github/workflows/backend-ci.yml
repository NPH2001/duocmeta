name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    name: Lint, test, and migrate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: duocmeta
          POSTGRES_USER: duocmeta
          POSTGRES_PASSWORD: duocmeta_ci
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U duocmeta -d duocmeta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: test
      APP_DEBUG: "false"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://duocmeta:duocmeta_ci@localhost:5432/duocmeta
      REDIS_URL: redis://localhost:6379/0
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Lint backend
        run: ruff check app alembic

      - name: Run backend tests
        run: pytest app/tests

      - name: Run migrations
        run: alembic upgrade head
